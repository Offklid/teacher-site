  <link rel="stylesheet" href="css/modern.css">

  <style>
    /* ──────────────── CALENDAR PAGE ────────────────────── */
    .cal-page {
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 1.25rem 5rem;
    }

    /* ─── Header ─── */
    .cal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .cal-month-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      animation: shimmer 3s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { filter: brightness(1); }
      to   { filter: brightness(1.2); }
    }

    .cal-nav {
      display: flex;
      gap: 0.5rem;
    }

    .cal-btn {
      background: rgba(102, 126, 234, 0.12);
      border: 1px solid rgba(102, 126, 234, 0.28);
      color: #c7d2fe;
      border-radius: 10px;
      padding: 0.55rem 1.15rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .cal-btn:hover {
      background: rgba(102, 126, 234, 0.28);
      border-color: rgba(102, 126, 234, 0.55);
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.2);
    }
    .cal-btn.today-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }
    .cal-btn.today-btn:hover {
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
    }

    /* ─── Weekday row ─── */
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-bottom: 5px;
    }
    .cal-wd {
      text-align: center;
      padding: 0.55rem 0;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #475569;
    }
    .cal-wd.weekend { color: #f472b6; }

    /* ─── Grid ─── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    /* ─── Day Cell ─── */
    .cal-cell {
      background: rgba(12, 17, 38, 0.7);
      border: 1px solid rgba(102, 126, 234, 0.12);
      border-radius: 14px;
      min-height: 170px;
      padding: 0.6rem 0.55rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      overflow: hidden;
      /* entrance animation — set by JS */
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      transition:
        border-color 0.25s,
        background 0.25s,
        transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.25s,
        opacity 0.3s;
    }

    /* Top accent bar */
    .cal-cell::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(90deg, #667eea, #f093fb);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .cal-cell.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .cal-cell.other-month { opacity: 0 !important; pointer-events: none; }

    .cal-cell.is-today {
      border-color: rgba(102, 126, 234, 0.55);
      background: rgba(102, 126, 234, 0.1);
      box-shadow: inset 0 0 0 1px rgba(102, 126, 234, 0.15);
    }
    .cal-cell.is-today::before { opacity: 1; }

    .cal-cell.is-weekend .day-num { color: #f472b6; }

    .cal-cell.has-ev {
      cursor: pointer;
    }
    .cal-cell.has-ev:hover {
      border-color: rgba(102, 126, 234, 0.45);
      background: rgba(102, 126, 234, 0.09);
      transform: translateY(-4px) scale(1.01) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(102,126,234,0.2);
    }
    .cal-cell.has-ev:hover::before { opacity: 0.7; }

    /* Ripple on click */
    .cal-cell .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.3);
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── Day Number ─── */
    .day-num {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 800;
      color: #c7d2fe;
      font-family: 'Space Grotesk', sans-serif;
      flex-shrink: 0;
      margin-bottom: 4px;
      transition: background 0.2s;
    }
    .cal-cell.is-today .day-num {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    /* ─── Event inside cell ─── */
    .cell-ev {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      font-size: 0.8rem;
      line-height: 1.4;
      font-weight: 500;
      padding: 1px 0;
    }
    .cell-ev-emoji { font-size: 1rem; flex-shrink: 0; line-height: 1.35; }
    .cell-ev-text  { color: #94a3b8; transition: color 0.2s; word-break: break-word; }
    .cal-cell.has-ev:hover .cell-ev-text { color: #c7d2fe; }

    .cell-more {
      font-size: 0.65rem;
      color: #475569;
      padding: 1px 4px;
      margin-top: 1px;
    }

    /* ─── Legend ─── */
    .cal-legend {
      margin-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.5rem;
      padding: 0.85rem 1.25rem;
      background: rgba(12, 17, 38, 0.55);
      border: 1px solid rgba(102, 126, 234, 0.12);
      border-radius: 14px;
    }
    .leg-i {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.79rem;
      color: #64748b;
    }
    .leg-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Popup ─── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .popup-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .popup-card {
      background: rgba(10, 14, 32, 0.98);
      border: 1px solid rgba(102, 126, 234, 0.35);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(20px) scale(0.95);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .popup-overlay.open .popup-card {
      transform: none;
    }
    /* Top gradient bar on popup */
    .popup-card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(90deg, #667eea, #f093fb);
    }

    .popup-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: none;
      color: #64748b;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .popup-close:hover { background: rgba(255,255,255,0.14); color: #e0e7ff; }

    .popup-meta    { font-size: 0.8rem; color: #475569; margin-bottom: 0.25rem; }
    .popup-big-day {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .popup-ev-row {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    }
    .popup-ev-row:last-child { border-bottom: none; }
    .popup-emoji { font-size: 1.75rem; line-height: 1; flex-shrink: 0; }
    .popup-ev-details { display: flex; flex-direction: column; gap: 0.3rem; }
    .popup-ev-name {
      font-size: 0.97rem;
      font-weight: 600;
      color: #e0e7ff;
      line-height: 1.2;
    }
    .popup-ev-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* ─── Responsive ─── */
    @media (max-width: 720px) {
      .cal-cell { min-height: 88px; padding: 0.4rem; border-radius: 10px; }
      .cell-ev  { font-size: 0.63rem; }
    }
    @media (max-width: 480px) {
      .cal-cell { min-height: 60px; }
      .cell-ev, .cell-more { display: none; }
    }
  </style>
</head>

  <script>
    AOS.init({ duration: 750, easing: 'ease-out-cubic', once: true, offset: 70 });

    particlesJS('particles-js', {
      particles: {
        number: { value: 55, density: { enable: true, value_area: 900 } },
        color: { value: ['#667eea','#764ba2','#f093fb','#4facfe'] },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true, anim: { enable: true, speed: 1, opacity_min: 0.1 } },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: '#667eea', opacity: 0.14, width: 1 },
        move: { enable: true, speed: 1.2, out_mode: 'out' }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover:{ enable:true, mode:'grab' }, onclick:{ enable:true, mode:'push' } },
        modes: { grab:{ distance:140, line_linked:{ opacity:0.4 } }, push:{ particles_nb:3 } }
      },
      retina_detect: true
    });
  </script>

      /* ── НОЯБРЬ ── */
      '11-08': [{ e:'☢️', n:'День рентгеновских лучей', d:'Открытие рентгеновского излучения перевернуло как химию (рентгеноструктурный анализ), так и медицину.' }],

      /* ── ДЕКАБРЬ ── */
      '12-11': [{ e:'⛰️', n:'Международный день гор', d:'Горные экосистемы невероятно хрупки и уникальны своими эндемиками (видами, обитающими только там).' }],
      '12-31': [{ e:'🎉', n:'Канун Нового года', d:'Время фейерверков, которые, кстати, обязаны своими яркими цветами солям различных металлов (стронций, медь, барий)!' }],
    };

    const YEAR_EVENTS = {
      '2024-05-05': [{ e:'🐣', n:'Светлое Христово Воскресение (Пасха)', d:'Праздник Пасхи.' }],
      '2025-04-20': [{ e:'🐣', n:'Светлое Христово Воскресение (Пасха)', d:'Праздник Пасхи.' }],
    };

    /* ================================================================
       FACTS — Интересные факты для заполнения "пустых" дней
    ================================================================ */
    const FACTS = [
      { e:'🧬', n:'Факт дня: ДНК', d:'Если развернуть ДНК из всех клеток человека, её длина составит около 16 миллиардов километров (хватит до Плутона и обратно)!' },
      { e:'🍓', n:'Факт дня: Клубника', d:'Клубника — не ягода с ботанической точки зрения, а разросшееся цветоложе. Её истинные плоды — мелкие "семечки" на поверхности.' },
      { e:'💧', n:'Факт дня: Вода', d:'Горячая вода замерзает быстрее холодной. Это называется эффектом Мпембы, и точного объяснения этому парадоксу до сих пор нет.' },
      { e:'🩸', n:'Факт дня: Железо', d:'В организме взрослого человека достаточно железа, чтобы сделать небольшой гвоздь длиной около 5-7 см.' },
      { e:'🍌', n:'Факт дня: Бананы и химия', d:'Бананы слегка радиоактивны из-за содержания в них природного изотопа калий-40.' },
      { e:'🌳', n:'Факт дня: Деревья', d:'Деревья в лесу могут "общаться" и обмениваться питательными веществами через огромную подземную грибную сеть (микоризу).' },
      { e:'🐙', n:'Факт дня: Осьминоги', d:'У осьминога три сердца и голубая кровь, так как кислород в ней переносит медь (белок гемоцианин), а не железо.' },
      { e:'💎', n:'Факт дня: Углерод', d:'Алмаз и стержень карандаша (графит) — это одно и то же вещество (чистый углерод), просто с разной кристаллической решеткой.' },
      { e:'🍅', n:'Факт дня: Помидор', d:'С точки зрения ботаники помидор — это ягода, а не овощ!' },
      { e:'🧠', n:'Факт дня: Мозг', d:'Мозг человека генерирует достаточно электричества (около 20 ватт), чтобы зажечь небольшую светодиодную лампочку.' },
      { e:'🍯', n:'Факт дня: Мёд', d:'Мёд практически никогда не портится благодаря низкому содержанию воды и высокой ферментативной кислотности.' },
      { e:'💨', n:'Факт дня: Кислород', d:'Большая часть кислорода (~70%) на Земле производится не деревьями, а микроскопическими водорослями в океане (фитопланктоном).' },
      { e:'🐜', n:'Факт дня: Биомасса муравьев', d:'Суммарный вес всех муравьев на Земле примерно равен суммарному весу всех людей.' },
      { e:'🍋', n:'Факт дня: Лимоны', d:'Лимоны содержат больше сахара, чем клубника!' },
      { e:'🦴', n:'Факт дня: Прочность костей', d:'Бедренная кость человека прочнее бетона из-за её уникальной трубчатой структуры и кальциевых солей.' },
      { e:'👃', n:'Факт дня: Обоняние', d:'Человеческий рецепторный аппарат способен различать около 1 триллиона различных запахов.' },
      { e:'🔥', n:'Факт дня: Пламя в космосе', d:'Реакция горения в невесомости протекает иначе: пламя приобретает сферическую форму синего цвета.' },
      { e:'👁️', n:'Факт дня: Наши глаза', d:'Мышцы наших глаз делают около 100 000 самых разных микродвижений каждый день.' },
      { e:'🍎', n:'Факт дня: Яблоки', d:'Яблоки на 25% состоят из микроскопических пузырьков воздуха, поэтому они не тонут в воде.' },
      { e:'💤', n:'Факт дня: Анабиоз улиток', d:'Некоторые виды улиток могут впадать в спячку до 3 лет подряд, если условия окружающей среды становятся неблагоприятными.' },
      { e:'🐘', n:'Факт дня: Слоны', d:'Слоны — одни из немногих млекопитающих, анатомия чьих ног не позволяет им прыгать.' },
      { e:'🍍', n:'Факт дня: Ананас', d:'Ананас содержит фермент бромелайн, который расщепляет белки. Когда вы едите ананас, химически он немного "ест" вас!' },
      { e:'🧪', n:'Факт дня: Осмий', d:'Самый плотный химический элемент на Земле — осмий. Кубик осмия со стороной 10 см весит около 22,6 кг!' },
      { e:'📱', n:'Факт дня: Добыча золота', d:'В одной тонне отслуживших смартфонов содержится больше золота, чем в одной тонне богатой золотоносной руды.' },
      { e:'🧊', n:'Факт дня: Свойства льда', d:'Лед менее плотный, чем вода из-за водородных связей. Из-за этого он плавает на поверхности, спасая водоёмы от полного промерзания.' },
      { e:'🦠', n:'Факт дня: Микробиом', d:'В организме человека клеток бактерий-симбионтов больше, чем его собственных клеток тела!' },
      { e:'🌌', n:'Факт дня: Гелий', d:'Гелий был впервые открыт на Солнце (по спектру излучения), и лишь потом найден на Земле. Отсюда и название (Гелиос — солнце).' },
      { e:'🦒', n:'Факт дня: Жираф', d:'У жирафа столько же шейных позвонков, сколько и у человека, и у мыши — ровно семь!' },
      { e:'🍌', n:'Факт дня: Гены', d:'Мы разделяем множество базовых клеточных механизмов с предками: человек делит около 60% своих генов с бананом.' },
      { e:'🍄', n:'Факт дня: Гигантские грибы', d:'Самый крупный живой организм на планете — опенок темный в США, его общая грибница (мицелий) занимает почти 9 квадратных километров.' },
      { e:'🦋', n:'Факт дня: Бабочки', d:'Бабочки чувствуют вкус нектарных сахаров с помощью рецепторов, расположенных прямо на их лапках.' },
      { e:'🥛', n:'Факт дня: Секрет бегемотов', d:'Выделения на коже бегемота имеют красный цвет из-за специфических кислот, работающих как солнцезащитный крем и антисептик.'}
    ];

    /* ─── CONSTANTS ─── */
    const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                    'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_GEN = ['Января','Февраля','Марта','Апреля','Мая','Июня',
                        'Июля','Августа','Сентября','Октября','Ноября','Декабря'];

    function pad2(n){ return String(n).padStart(2,'0'); }
    function mdKey(m,d){ return `${pad2(m+1)}-${pad2(d)}`; }

    let cur = new Date(); cur.setDate(1); cur.setHours(0,0,0,0);

    /* ─── RENDER ─── */
    function render(){
      const y = cur.getFullYear(), m = cur.getMonth();
      document.getElementById('calLabel').textContent = `${MONTHS[m]} ${y}`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      const today = new Date(); today.setHours(0,0,0,0);
      const firstDow = new Date(y,m,1).getDay();         // 0=Sun
      const offset   = firstDow===0 ? 6 : firstDow-1;   // shift to Mon-first
      const daysInM  = new Date(y,m+1,0).getDate();
      const daysInP  = new Date(y,m,0).getDate();
      const total    = Math.ceil((offset+daysInM)/7)*7;

      for(let i=0; i<total; i++){
        let d, cm=m, cy=y;
        if(i < offset){
          d=daysInP-offset+1+i; cm=m-1;
          if(cm<0){cm=11;cy--;}
        } else if(i>=offset+daysInM){
          d=i-offset-daysInM+1; cm=m+1;
          if(cm>11){cm=0;cy++;}
        } else {
          d=i-offset+1;
        }

        const cellDate=new Date(cy,cm,d); cellDate.setHours(0,0,0,0);
        const isToday  = cellDate.getTime()===today.getTime();
        const isWkend  = (i%7>=5);
        const isOther  = (cm!==m);
        const key      = mdKey(cm,d);
        const fullKey  = `${cy}-${pad2(cm+1)}-${pad2(d)}`;
        let evs      = [...(EVENTS[key]||[]), ...(YEAR_EVENTS[fullKey]||[])];

        /* If no explicit events exist, inject a "Fact of the Day" */
        if (evs.length === 0) {
          const factIndex = (cm * 31 + d) % FACTS.length;
          evs.push(FACTS[factIndex]);
        }

        /* Build cell */
        const cell = document.createElement('div');
        cell.className = 'cal-cell'
          +(isToday  ? ' is-today'    : '')
          +(isWkend  ? ' is-weekend'  : '')
          +(isOther  ? ' other-month' : '')
          +(evs.length ? ' has-ev'   : '');

        /* Day number */
        const numEl = document.createElement('div');
        numEl.className='day-num';
        numEl.textContent=d;
        cell.appendChild(numEl);

        /* Events (max 2 visible) */
        if(!isOther){
          evs.slice(0,2).forEach(ev=>{
            const row=document.createElement('div');
            row.className='cell-ev';
            row.innerHTML=`<span class="cell-ev-emoji">${ev.e}</span><span class="cell-ev-text">${ev.n}</span>`;
            cell.appendChild(row);
          });
          if(evs.length>2){
            const m2=document.createElement('div');
            m2.className='cell-more';
            m2.textContent=`+${evs.length-2} ещё`;
            cell.appendChild(m2);
          }
        }

        /* Ripple on click */
        if(evs.length && !isOther){
          cell.addEventListener('click', e=>{
            const r=document.createElement('span');
            r.className='ripple';
            const size=Math.max(cell.offsetWidth,cell.offsetHeight);
            const rect=cell.getBoundingClientRect();
            r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
            cell.appendChild(r);
            r.addEventListener('animationend',()=>r.remove());
            openPopup(d, cm, y, evs);
          });
        }

        grid.appendChild(cell);
      }

      /* Stagger entrance animation */
      requestAnimationFrame(()=>{
        const cells=[...grid.querySelectorAll('.cal-cell:not(.other-month)')];
        cells.forEach((c,i)=>{
          setTimeout(()=>c.classList.add('visible'), i*22);
        });
        /* also make other-month cells appear dimly */
        grid.querySelectorAll('.cal-cell.other-month').forEach(c=>{
          setTimeout(()=>{ c.style.opacity='0.12'; c.style.transform='none'; },0);
        });
      });
    }

    /* ─── POPUP ─── */
    const ov=document.getElementById('popupOv');

    document.getElementById('popupClose').addEventListener('click',()=>ov.classList.remove('open'));
    ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('open'); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') ov.classList.remove('open'); });

    function openPopup(d,m,y,evs){
      document.getElementById('popMeta').textContent=`${MONTHS_GEN[m]} ${y}`;
      document.getElementById('popDay').textContent=d;
      document.getElementById('popEvents').innerHTML=evs.map(ev=>`
        <div class="popup-ev-row">
          <div class="popup-emoji">${ev.e}</div>
          <div class="popup-ev-details">
            <div class="popup-ev-name">${ev.n}</div>
            ${ev.d ? `<div class="popup-ev-desc">${ev.d}</div>` : ''}
          </div>
        </div>`).join('');
      ov.classList.add('open');
    }

    /* ─── NAV ─── */
    document.getElementById('btnPrev').addEventListener('click',()=>{
      cur.setMonth(cur.getMonth()-1); render();
    });
    document.getElementById('btnNext').addEventListener('click',()=>{
      cur.setMonth(cur.getMonth()+1); render();
    });
    document.getElementById('btnToday').addEventListener('click',()=>{
      cur=new Date(); cur.setDate(1); cur.setHours(0,0,0,0); render();
    });

    render();
  </script>
</body>
